# Site coordinates — loaded fresh at the start of every ingest run and
# applied as `lat` / `lng` / `region` properties on :Site nodes during the
# site-MERGE phase. See apps/ingestor/src/sites-coords.ts for the loader.
#
# Keys MUST match :Site.name in Neo4j — the single-token site code produced
# by parseHostname (packages/db/src/hostname.ts). Keys not matching any
# :Site node are harmless (they stay in the YAML; nothing is written).
#
# This file is the ONLY source of geographic data for the /map page. It is
# NOT populated from app_sitesportal (the source DB has no lat/lng columns)
# nor is it persisted to Neo4j without an ingest. Regenerate from v1 via
# `pnpm tsx scripts/extract-v1-sites.ts` once v1 access is available —
# the starter seed below uses public city-center coordinates for the major
# Saudi metropolitan codes Mobily operates from and is intended as a
# placeholder until a full device-count-weighted extract replaces it.
#
# Coordinates below are public geographic data (city centers), not operator
# facility locations. Real facility coordinates live in v1 and must be
# curated before this file goes to production.

