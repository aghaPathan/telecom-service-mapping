# Telecom hierarchy — loaded fresh at the start of every ingest run.
# Edit this file and re-trigger ingest to adjust levels without rebuilding.
#
# Each entry binds a numeric `level` (float — supports 3.5 for Transport) to a
# human label and a set of canonical role names. A device's role is resolved
# first (see role_codes.yaml), then mapped to (level, label) here.

levels:
  - level: 1
    label: Core
    roles: [CORE, IRR, VRR]
  - level: 2
    label: Aggregation
    roles: [UPE]
  - level: 3
    label: CustomerAggregation
    roles: [CSG, GPON, SW]
  - level: 3.5
    label: Transport
    roles: [MW]
  - level: 4
    label: Access
    roles: [RAN, PTP, PMP]
  - level: 5
    label: Customer
    roles: [Customer]

# Unknown bucket for devices whose role cannot be resolved from the source
# columns or name prefix. Curated over time as new codes are confirmed.
unknown_label: Unknown
unknown_level: 99

# Post-ingest topology pass: re-level :SW nodes based on their neighbors.
#   - SW connected to any :CORE          → level 2
#   - SW connected to any :RAN/:Customer → level 4
#   - else                                → level 3 (default for CustomerAggregation)
sw_dynamic_leveling:
  enabled: true

# Multi-label classification map. Keyed by the RAW role code from type_map or
# name_token.map (e.g. "RGUF"), NOT by the resolved role name ("RAN"). This
# lets a single raw code contribute to multiple technology tags even if two
# raw codes share a resolved role. The resolver attaches these as `tags[]` on
# ResolvedRole; persistence to Neo4j is handled in the writer (Task 6).
#
# Seeded with RAN multi-tech variants observed in V1 IsolationSummary data:
#   RGUF — Uplink (U) FDD: serves 3G + 4G
#   RGUL — Uplink (U) LTE: serves 3G + 4G
#   RGUX — Uplink (U) mixed: serves 3G + 4G + 5G
tag_map:
  RGUF: [3G, 4G]
  RGUL: [3G, 4G]
  RGUX: [3G, 4G, 5G]
