# CI-only override: expose internal ports so GitHub-Actions-hosted
# Playwright (running outside the compose network) can reach Postgres
# and Neo4j for E2E seed/teardown. Production deployments never include
# this file — only Caddy publishes to the host.
services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
  neo4j:
    ports:
      - "127.0.0.1:7687:7687"
  caddy:
    environment:
      CADDY_TLS_MODE: http
  ingestor:
    # Smoke-mode ingestor exits 0 after seeding; Docker marks an exited
    # container "unhealthy" the moment a healthcheck is defined, which makes
    # `docker compose up --wait` fail regardless of how `web.depends_on`
    # is configured. Disable the healthcheck in this overlay only —
    # production compose still has it wired for `docker compose ps`
    # operator visibility in long-lived full mode.
    healthcheck:
      # Compose merges healthcheck blocks rather than replacing them; setting
      # `test: ["NONE"]` is the documented way to cancel the parent's CMD.
      # `disable: true` alone does not override when the base compose
      # specifies an explicit `test`.
      test: ["NONE"]
      disable: true
