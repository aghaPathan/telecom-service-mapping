# CI-only override: expose internal ports so GitHub-Actions-hosted
# Playwright (running outside the compose network) can reach Postgres
# and Neo4j for E2E seed/teardown. Production deployments never include
# this file — only Caddy publishes to the host.
services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
  neo4j:
    ports:
      - "127.0.0.1:7687:7687"
  caddy:
    environment:
      CADDY_TLS_MODE: http
